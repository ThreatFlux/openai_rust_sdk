name: Docker

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/docker.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "test_data/**"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ vars.RUST_TEMPLATE_DOCKERHUB_NAMESPACE || 'threatflux' }}
  DOCKER_BUILDKIT: 1
  DOCKER_PLATFORMS: ${{ vars.RUST_TEMPLATE_DOCKER_PLATFORMS || 'linux/amd64' }}
  BINARY_NAME: ${{ vars.RUST_TEMPLATE_BINARY_NAME || 'openai_rust_sdk' }}
  BINARY_PACKAGE: ${{ vars.RUST_TEMPLATE_BINARY_PACKAGE || '' }}
  CLI_NAME: ${{ vars.RUST_TEMPLATE_CLI_NAME || 'openai-rust-sdk' }}
  SBOM_MANIFEST_PATH: ${{ vars.RUST_TEMPLATE_SBOM_MANIFEST_PATH || 'Cargo.toml' }}
  OCI_IMAGE_TITLE: OpenAI Rust SDK
  OCI_IMAGE_DESCRIPTION: Comprehensive OpenAI API SDK for Rust with YARA rule validation
  OCI_IMAGE_VENDOR: ThreatFlux
  OCI_IMAGE_SOURCE: https://github.com/threatflux/openai_rust_sdk

jobs:
  build:
    name: Build Docker Image
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lowercase image name
        id: lowercase
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker Hub repository name
        id: dockerhub_repo
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "name=$(echo "${REPO_NAME}" | tr '[:upper:]_' '[:lower:]-')" >> "$GITHUB_OUTPUT"

      - name: Detect Rust toolchain version
        id: rust_toolchain
        run: |
          TOOLCHAIN_VERSION="$(sed -n 's/^channel[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' rust-toolchain.toml | sed -n '1p')"
          echo "version=${TOOLCHAIN_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Select build platforms
        id: platforms
        run: |
          PLATFORMS="${DOCKER_PLATFORMS:-linux/amd64}"
          echo "value=${PLATFORMS}" >> "$GITHUB_OUTPUT"
          if echo "${PLATFORMS}" | grep -Eq 'linux/(arm64|arm/v[0-9]+)'; then
            echo "needs_qemu=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_qemu=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.platforms.outputs.needs_qemu == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract runtime metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.dockerhub_repo.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ env.OCI_IMAGE_TITLE }}
            org.opencontainers.image.description=${{ env.OCI_IMAGE_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.OCI_IMAGE_VENDOR }}
            org.opencontainers.image.source=${{ env.OCI_IMAGE_SOURCE }}
            maintainer=Wyatt Roersma <wyattroersma@gmail.com>

      - name: Extract base image metadata
        id: base_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.dockerhub_repo.outputs.name }}
          tags: |
            type=raw,value=base-rust-${{ steps.rust_toolchain.outputs.version }}
            type=raw,value=base-rust-latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ env.OCI_IMAGE_TITLE }} Rust Base
            org.opencontainers.image.description=Rust ${{ steps.rust_toolchain.outputs.version }} base image for ${{ env.OCI_IMAGE_TITLE }}
            org.opencontainers.image.vendor=${{ env.OCI_IMAGE_VENDOR }}
            org.opencontainers.image.source=${{ env.OCI_IMAGE_SOURCE }}

      - name: Build base image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: rust-base
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.base_meta.outputs.tags }}
          labels: ${{ steps.base_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            BINARY_NAME=${{ env.BINARY_NAME }}
            BINARY_PACKAGE=${{ env.BINARY_PACKAGE }}
            CLI_NAME=${{ env.CLI_NAME }}
            SBOM_MANIFEST_PATH=${{ env.SBOM_MANIFEST_PATH }}
            OCI_IMAGE_TITLE=${{ env.OCI_IMAGE_TITLE }}
            OCI_IMAGE_DESCRIPTION=${{ env.OCI_IMAGE_DESCRIPTION }}
            OCI_IMAGE_VENDOR=${{ env.OCI_IMAGE_VENDOR }}
            OCI_IMAGE_SOURCE=${{ env.OCI_IMAGE_SOURCE }}

      - name: Build and export (PRs)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ steps.lowercase.outputs.image_name }}:scan
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            BINARY_NAME=${{ env.BINARY_NAME }}
            BINARY_PACKAGE=${{ env.BINARY_PACKAGE }}
            CLI_NAME=${{ env.CLI_NAME }}
            SBOM_MANIFEST_PATH=${{ env.SBOM_MANIFEST_PATH }}
            OCI_IMAGE_TITLE=${{ env.OCI_IMAGE_TITLE }}
            OCI_IMAGE_DESCRIPTION=${{ env.OCI_IMAGE_DESCRIPTION }}
            OCI_IMAGE_VENDOR=${{ env.OCI_IMAGE_VENDOR }}
            OCI_IMAGE_SOURCE=${{ env.OCI_IMAGE_SOURCE }}

      - name: Build and push runtime image (non-PR)
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            BINARY_NAME=${{ env.BINARY_NAME }}
            BINARY_PACKAGE=${{ env.BINARY_PACKAGE }}
            CLI_NAME=${{ env.CLI_NAME }}
            SBOM_MANIFEST_PATH=${{ env.SBOM_MANIFEST_PATH }}
            OCI_IMAGE_TITLE=${{ env.OCI_IMAGE_TITLE }}
            OCI_IMAGE_DESCRIPTION=${{ env.OCI_IMAGE_DESCRIPTION }}
            OCI_IMAGE_VENDOR=${{ env.OCI_IMAGE_VENDOR }}
            OCI_IMAGE_SOURCE=${{ env.OCI_IMAGE_SOURCE }}

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  scan:
    name: Security Scan
    needs: build
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download image (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: /tmp

      - name: Load image (PRs)
        if: github.event_name == 'pull_request'
        run: docker load -i /tmp/image.tar

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        if: github.event_name != 'pull_request'
        run: docker pull ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ steps.sha.outputs.short }}

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ github.event_name == 'pull_request' && format('{0}:scan', needs.build.outputs.image_name) || format('{0}/{1}:{2}', env.REGISTRY, needs.build.outputs.image_name, steps.sha.outputs.short) }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@3d8036cf7fe7433e4a725cf513a6ea56c7fd0f14 # codeql-bundle-v2.25.0
        with:
          sarif_file: trivy-results.sarif
        if: always() && hashFiles('trivy-results.sarif') != ''

  test:
    name: Test Docker Image
    needs: build
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    steps:
      - name: Download image (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-image
          path: /tmp

      - name: Load image (PRs)
        if: github.event_name == 'pull_request'
        run: docker load -i /tmp/image.tar

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        if: github.event_name != 'pull_request'
        run: docker pull ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ steps.sha.outputs.short }}

      - name: Test image startup
        env:
          PR_IMAGE: ${{ needs.build.outputs.image_name }}:scan
          RELEASE_IMAGE: ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ steps.sha.outputs.short }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMAGE="${PR_IMAGE}"
          else
            IMAGE="${RELEASE_IMAGE}"
          fi
          docker run --rm "${IMAGE}" --version
          docker run --rm "${IMAGE}" --help

      - name: Test container health check
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ${{ needs.build.outputs.image_name }}:scan
        run: |
          docker run -d --name test-container "${IMAGE}" --version
          sleep 5
          docker inspect test-container
          docker stop test-container || true
          docker rm test-container || true

  sign:
    name: Sign Container
    needs: [build, scan, test]
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container image
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

  sbom:
    name: Generate SBOM
    needs: build
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    if: github.event_name != 'pull_request'
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ steps.sha.outputs.short }}
          artifact-name: sbom.spdx.json
          format: spdx-json
        continue-on-error: true

  docker-success:
    name: Docker Build Success
    runs-on: ${{ vars.RUST_TEMPLATE_RUNNER_UBUNTU || 'ubuntu-latest' }}
    needs: [build, scan, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Docker build failed"
            exit 1
          fi
          if [[ "${{ needs.scan.result }}" != "success" ]]; then
            echo "Security scan did not complete successfully"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Docker image tests failed"
            exit 1
          fi
          echo "Docker workflow completed successfully"
